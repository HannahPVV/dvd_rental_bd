version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pagila_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pagila
    ports:
      - "5432:5432"
    volumes:
      #  carga la base Pagila al iniciar 
      - ./sql/pagila.sql:/docker-entrypoint-initdb.d/pagila.sql

  api:
    build: .
    container_name: dvd_rental_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # Raquel:Faltaba esto para uvicorn